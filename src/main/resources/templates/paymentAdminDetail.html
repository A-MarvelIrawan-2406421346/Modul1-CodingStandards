<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><title>Admin - Review Payment</title></head>
<body>
<h2>Review Payment</h2>
<p><strong>Payment ID:</strong> <span th:text="${payment.id}"></span></p>
<p><strong>Method:</strong> <span th:text="${payment.method}"></span></p>
<p><strong>Current Status:</strong> <span th:text="${payment.status}"></span></p>

<form th:action="@{/payment/admin/set-status/{id}(id=${payment.id})}" method="post">
    <label for="status">Set Status:</label>
    <select name="status" id="status">
        <option value="SUCCESS">ACCEPT / SUCCESS</option>
        <option value="REJECTED">REJECT</option>
    </select>
    <button type="submit">Update Status</button>
</form>
</body>
</html>
